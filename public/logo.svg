<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Human Head Silhouette -->
  <path d="M20 30 C20 20, 30 15, 50 15 C70 15, 80 20, 80 30 C80 40, 75 50, 70 60 C65 70, 60 75, 50 75 C40 75, 35 70, 30 60 C25 50, 20 40, 20 30 Z" fill="url(#headGradient)" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Neural Network -->
  <g stroke="#1e40af" stroke-width="1" fill="none">
    <!-- Network lines -->
    <line x1="35" y1="25" x2="45" y2="35"/>
    <line x1="45" y1="35" x2="55" y2="25"/>
    <line x1="55" y1="25" x2="65" y2="35"/>
    <line x1="35" y1="35" x2="50" y2="45"/>
    <line x1="50" y1="45" x2="65" y2="35"/>
    <line x1="40" y1="45" x2="60" y2="45"/>
    <line x1="35" y1="25" x2="50" y2="40"/>
    <line x1="65" y1="25" x2="50" y2="40"/>
    
    <!-- Network nodes -->
    <circle cx="35" cy="25" r="2" fill="#ef4444"/>
    <circle cx="45" cy="35" r="2" fill="#3b82f6"/>
    <circle cx="55" cy="25" r="2" fill="#ef4444"/>
    <circle cx="65" cy="35" r="2" fill="#3b82f6"/>
    <circle cx="50" cy="45" r="2" fill="#ef4444"/>
    <circle cx="40" cy="45" r="2" fill="#3b82f6"/>
    <circle cx="60" cy="45" r="2" fill="#ef4444"/>
    <circle cx="50" cy="40" r="2" fill="#3b82f6"/>
  </g>
  
  <!-- Curved swoosh -->
  <path d="M25 70 Q50 85, 75 70" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <defs>
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>
</svg>
